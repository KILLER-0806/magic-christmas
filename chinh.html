<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magic Christmas - Spherical Upgrade</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

<style>
body { margin:0; overflow:hidden; background:#000; font-family:Segoe UI }
#canvas-container { width:100%; height:100vh }
#ui-layer { position:absolute; bottom:30px; width:100%; text-align:center; z-index:10 }
button {
  padding:15px 50px; font-size:16px; font-weight:bold;
  border-radius:30px; border:2px solid gold;
  background:linear-gradient(#d32f2f,#8b0000);
  color:white; cursor:pointer;
}
#camera-preview {
  position:absolute; top:15px; right:15px;
  width:120px; height:90px; opacity:0.6;
  transform:scaleX(-1);
}
</style>
</head>

<body>

<div id="ui-layer">
  <div style="color:#aaa;font-size:13px;margin-bottom:10px">
    🖐 Open → Explode | ✊ Fist → Tree | 🤏 Pinch → Photo | 🫶 Two Hands → Heart
  </div>
  <button onclick="startSystem()">START MAGIC</button>
</div>

<div id="canvas-container"></div>
<video class="input_video" style="display:none"></video>
<canvas id="camera-preview"></canvas>

<script>
// =================================================
// GLOBAL
// =================================================
let scene, camera, renderer;
let groupGold, groupRed, groupGift;
let photoMeshes = [];

let state = "TREE";
let selectedIndex = 0;

// spherical control
let handX = 0.5, handY = 0.5;
let rotY = 0, rotX = 0;

// =================================================
// CONFIG
// =================================================
const CONFIG = {
  goldCount: 2000,
  redCount: 300,
  giftCount: 150,
  explodeRadius: 65,
  photoOrbitRadius: 25,
  treeHeight: 70,
  treeBaseRadius: 35
};

// =================================================
// INIT
// =================================================
function startSystem() {
  init3D();
  initHands();
}

// =================================================
// THREE
// =================================================
function init3D() {
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);
  camera.position.z = 100;

  renderer = new THREE.WebGLRenderer({ antialias:true });
  renderer.setSize(innerWidth, innerHeight);
  document.getElementById("canvas-container").appendChild(renderer.domElement);

  groupGold = createParticles(CONFIG.goldCount, 0xFFD700, 2);
  groupRed  = createParticles(CONFIG.redCount,  0xFF0000, 3);
  groupGift = createParticles(CONFIG.giftCount, 0xFFFFFF, 3);

  createPhotos();
  animate();
}

// =================================================
// PARTICLES
// =================================================
function createParticles(count, color, size) {
  const pos = [], tree = [], explode = [];
  for (let i=0;i<count;i++) {
    const h = Math.random()*CONFIG.treeHeight;
    const r = (1-h/CONFIG.treeHeight)*CONFIG.treeBaseRadius*Math.random();
    const t = Math.random()*Math.PI*2;
    tree.push(r*Math.cos(t), h-CONFIG.treeHeight/2, r*Math.sin(t));

    const u=Math.random(), v=Math.random();
    const phi=Math.acos(2*v-1), lam=2*Math.PI*u;
    const R=CONFIG.explodeRadius*Math.cbrt(Math.random());
    explode.push(
      R*Math.sin(phi)*Math.cos(lam),
      R*Math.sin(phi)*Math.sin(lam),
      R*Math.cos(phi)
    );

    pos.push(tree[i*3], tree[i*3+1], tree[i*3+2]);
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute("position", new THREE.Float32BufferAttribute(pos,3));
  geo.userData = { tree, explode };

  const mat = new THREE.PointsMaterial({
    size, color,
    transparent:true,
    blending:THREE.AdditiveBlending
  });

  const pts = new THREE.Points(geo, mat);
  scene.add(pts);
  return pts;
}

// =================================================
// PHOTOS
// =================================================
function createPhotos() {
  const loader = new THREE.TextureLoader();
  for (let i=0;i<5;i++) {
    const mesh = new THREE.Mesh(
      new THREE.PlaneGeometry(8,8),
      new THREE.MeshBasicMaterial({
        map: loader.load(`image${i+1}.jpeg`),
        side: THREE.DoubleSide
      })
    );
    mesh.visible = false;
    scene.add(mesh);
    photoMeshes.push(mesh);
  }
}

// =================================================
// ANIMATE
// =================================================
function animate() {
  requestAnimationFrame(animate);

  // SPHERICAL ROTATION
  const targetRotY = (handX-0.5)*Math.PI*2;
  const targetRotX = (handY-0.5)*Math.PI;

  rotY += (targetRotY-rotY)*0.08;
  rotX += (targetRotX-rotX)*0.08;
  rotX = Math.max(-Math.PI/3, Math.min(Math.PI/3, rotX));

  [groupGold,groupRed,groupGift].forEach(g=>{
    g.rotation.set(rotX, rotY, 0);
    const target = (state==="TREE") ? g.geometry.userData.tree : g.geometry.userData.explode;
    const p = g.geometry.attributes.position.array;
    for(let i=0;i<p.length;i++) p[i] += (target[i]-p[i])*0.08;
    g.geometry.attributes.position.needsUpdate = true;
  });

  // PHOTOS SPHERE
  if (state==="EXPLODE") {
    photoMeshes.forEach((m,i)=>{
      m.visible = true;
      const a = rotY + i*Math.PI*2/5;
      const x = Math.sin(a)*CONFIG.photoOrbitRadius*Math.cos(rotX);
      const y = Math.sin(rotX)*CONFIG.photoOrbitRadius;
      const z = Math.cos(a)*CONFIG.photoOrbitRadius*Math.cos(rotX);
      m.position.lerp(new THREE.Vector3(x,y,z),0.1);
      m.lookAt(camera.position);
    });
  } else photoMeshes.forEach(m=>m.visible=false);

  renderer.render(scene,camera);
}

// =================================================
// HAND TRACKING
// =================================================
function initHands() {
  const video = document.querySelector(".input_video");
  const canvas = document.getElementById("camera-preview");
  const ctx = canvas.getContext("2d");

  const hands = new Hands({ locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
  hands.setOptions({ maxNumHands:2, minDetectionConfidence:0.5 });

  hands.onResults(res=>{
    ctx.clearRect(0,0,120,90);
    ctx.drawImage(res.image,0,0,120,90);

    if (res.multiHandLandmarks.length) {
      const lm = res.multiHandLandmarks[0];
      handX = lm[9].x;
      handY = lm[9].y;

      const pinch = Math.hypot(lm[4].x-lm[8].x, lm[4].y-lm[8].y);
      state = pinch < 0.05 ? "PHOTO" : "EXPLODE";
    } else state = "TREE";
  });

  new Camera(video,{
    onFrame: async()=>hands.send({image:video}),
    width:320,height:240
  }).start();
}

// =================================================
addEventListener("resize",()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
